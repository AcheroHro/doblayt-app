<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DoblaYT – Traductor de YouTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #080b12; font-family: 'IBM Plex Sans', sans-serif; }
    .fade-in { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .pop-in { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }
    .btn-main:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(229,45,39,0.45) !important; }
    .btn-main:active { transform: translateY(0); }
    .spinner { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.3; transform:scale(0.6); } }
    input::placeholder { color: #374151; }
    input:focus { outline: none; border-color: rgba(0,212,255,0.4) !important; box-shadow: 0 0 0 3px rgba(0,212,255,0.08); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .substep-item { transition: transform 0.15s; }
    .substep-item:hover { transform: translateX(2px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ⚠️ CAMBIÁ ESTA URL por la de tu Space en Hugging Face
    const API_URL = "https://achero-doblayt-backend.hf.space";

    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { icon: "⬇️", label: "Descargando audio",   desc: "Extrayendo audio del video..." },
      { icon: "🎙️", label: "Transcribiendo",       desc: "Whisper detectando voz en inglés..." },
      { icon: "🌐", label: "Traduciendo",           desc: "Convirtiendo texto al español..." },
      { icon: "🔊", label: "Generando voz",         desc: "Sintetizando audio en español..." },
      { icon: "🎬", label: "Sincronizando",         desc: "Combinando video + audio doblado..." },
    ];

    function App() {
      const [url, setUrl]               = useState("");
      const [phase, setPhase]           = useState("idle");
      const [currentStep, setCurrentStep] = useState(0);
      const [stepProg, setStepProg]     = useState(0);
      const [videoInfo, setVideoInfo]   = useState(null);
      const [downloadUrl, setDownloadUrl] = useState(null);
      const [error, setError]           = useState("");
      const timerRef = useRef(null);

      const isValid = (u) => /(?:youtube\.com\/watch\?v=|youtu\.be\/)[\w-]{11}/.test(u);
      const getThumb = (u) => {
        const m = u.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
        return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : null;
      };

      const handleTranslate = async () => {
        if (!isValid(url)) { setError("⚠️ Pegá un link válido de YouTube."); return; }
        setError("");
        setVideoInfo({ thumb: getThumb(url) });
        setPhase("processing");
        setCurrentStep(0);
        setStepProg(0);

        // Simulación visual mientras el backend trabaja
        let step = 0, prog = 0;
        timerRef.current = setInterval(() => {
          prog += 3;
          setStepProg(prog);
          if (prog >= 100) {
            prog = 0; step++;
            setCurrentStep(step);
            if (step >= STEPS.length) clearInterval(timerRef.current);
          }
        }, 600);

        try {
          const res = await fetch(`${API_URL}/traducir`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url }),
          });
          if (!res.ok) throw new Error(await res.text());
          const blob = await res.blob();
          const objUrl = URL.createObjectURL(blob);
          clearInterval(timerRef.current);
          setDownloadUrl(objUrl);
          setPhase("done");
        } catch (e) {
          clearInterval(timerRef.current);
          setError("❌ Error del servidor: " + e.message);
          setPhase("idle");
        }
      };

      const reset = () => {
        clearInterval(timerRef.current);
        setUrl(""); setPhase("idle"); setCurrentStep(0);
        setStepProg(0); setVideoInfo(null);
        setDownloadUrl(null); setError("");
      };

      useEffect(() => () => clearInterval(timerRef.current), []);

      // ─── ESTILOS ───────────────────────────────────────────────
      const S = {
        root:      { minHeight:"100vh", background:"#080b12", color:"#e8eaf0", maxWidth:420, margin:"0 auto", display:"flex", flexDirection:"column" },
        header:    { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"18px 18px 14px", borderBottom:"1px solid rgba(255,255,255,0.06)", background:"rgba(255,255,255,0.02)" },
        logo:      { display:"flex", alignItems:"center", gap:12 },
        logoIcon:  { width:40, height:40, borderRadius:12, background:"linear-gradient(135deg,#e52d27,#b31217)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, color:"#fff", boxShadow:"0 4px 16px rgba(229,45,39,0.4)", flexShrink:0 },
        logoTitle: { fontSize:18, fontWeight:700, color:"#fff" },
        logoSub:   { fontSize:11, color:"#6b7280" },
        badge:     { fontSize:10, fontWeight:700, color:"#00d4ff", border:"1px solid rgba(0,212,255,0.3)", borderRadius:6, padding:"3px 8px", background:"rgba(0,212,255,0.08)", letterSpacing:1 },
        main:      { flex:1, padding:"20px 16px" },
        heroText:  { fontSize:22, fontWeight:700, lineHeight:1.3, textAlign:"center", marginBottom:24, color:"#c9d1e0" },
        accent:    { color:"#00d4ff" },
        card:      { background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:20, padding:20, marginBottom:16 },
        label:     { fontSize:12, color:"#6b7280", marginBottom:10, fontWeight:600, letterSpacing:0.5 },
        inputRow:  { display:"flex", alignItems:"center", gap:8, marginBottom:14 },
        input:     { flex:1, background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:12, padding:"13px 14px", color:"#e8eaf0", fontSize:14, fontFamily:"inherit" },
        clearBtn:  { background:"rgba(255,255,255,0.08)", border:"none", color:"#9ca3af", borderRadius:8, width:34, height:34, cursor:"pointer", fontSize:14, flexShrink:0 },
        errBox:    { fontSize:13, color:"#f87171", background:"rgba(248,113,113,0.1)", borderRadius:8, padding:"8px 12px", marginBottom:12 },
        btn:       { width:"100%", padding:"15px 20px", background:"linear-gradient(135deg,#e52d27,#ff6b35)", border:"none", borderRadius:14, color:"#fff", fontSize:16, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8, boxShadow:"0 6px 24px rgba(229,45,39,0.35)", transition:"transform 0.15s, box-shadow 0.15s" },
        btnDis:    { background:"rgba(255,255,255,0.08)", boxShadow:"none", color:"#4b5563", cursor:"not-allowed" },
        pills:     { display:"flex", flexWrap:"wrap", gap:8, marginBottom:24, justifyContent:"center" },
        pill:      { fontSize:12, padding:"6px 12px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, color:"#9ca3af" },
        howTitle:  { fontSize:13, fontWeight:700, color:"#6b7280", marginBottom:14, letterSpacing:1, textTransform:"uppercase" },
        howList:   { display:"flex", flexDirection:"column", gap:10 },
        howItem:   { display:"flex", alignItems:"flex-start", gap:14 },
        howNum:    { width:28, height:28, borderRadius:8, flexShrink:0, background:"linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,212,255,0.05))", border:"1px solid rgba(0,212,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"#00d4ff" },
        howText:   { fontSize:14, color:"#9ca3af", paddingTop:4, lineHeight:1.5 },
        thumbCard: { borderRadius:16, overflow:"hidden", marginBottom:16, position:"relative" },
        thumb:     { width:"100%", display:"block", aspectRatio:"16/9", objectFit:"cover" },
        thumbBadge:{ position:"absolute", bottom:10, left:10, fontSize:12, fontWeight:700, color:"#fff", background:"rgba(0,0,0,0.7)", borderRadius:8, padding:"4px 10px" },
        procTitle: { fontSize:18, fontWeight:700, textAlign:"center", marginBottom:4 },
        procSub:   { fontSize:12, color:"#6b7280", textAlign:"center", marginBottom:20 },
        stepRow:   { display:"flex", alignItems:"flex-start", gap:12, marginBottom:14 },
        stepIcon:  { width:36, height:36, borderRadius:10, flexShrink:0, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 },
        stepIconA: { background:"rgba(0,212,255,0.15)", border:"1px solid rgba(0,212,255,0.4)", boxShadow:"0 0 12px rgba(0,212,255,0.2)" },
        stepIconD: { background:"rgba(0,200,83,0.15)", border:"1px solid rgba(0,200,83,0.3)" },
        stepLabel: { fontSize:14, fontWeight:600, color:"#4b5563", paddingTop:8 },
        stepLabelA:{ color:"#e8eaf0" },
        stepLabelD:{ color:"#6b7280" },
        stepDesc:  { fontSize:12, color:"#6b7280", marginTop:2 },
        progBar:   { marginTop:8, height:4, background:"rgba(255,255,255,0.06)", borderRadius:4, overflow:"hidden" },
        progFill:  { height:"100%", background:"linear-gradient(90deg,#00d4ff,#7c3aed)", borderRadius:4, transition:"width 0.2s linear" },
        dot:       { width:8, height:8, borderRadius:"50%", background:"#00d4ff", marginTop:14, flexShrink:0 },
        overAll:   { height:6, background:"rgba(255,255,255,0.06)", borderRadius:6, overflow:"hidden", marginTop:8 },
        overFill:  { height:"100%", background:"linear-gradient(90deg,#e52d27,#ff6b35,#00d4ff)", borderRadius:6, transition:"width 0.2s linear" },
        overLabel: { fontSize:12, color:"#6b7280", marginTop:16, marginBottom:6, textAlign:"right" },
        cancelBtn: { width:"100%", padding:12, background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, color:"#6b7280", fontSize:14, cursor:"pointer", marginTop:8 },
        doneHero:  { textAlign:"center", marginBottom:20 },
        doneWrap:  { width:72, height:72, borderRadius:24, margin:"0 auto 12px", background:"linear-gradient(135deg,rgba(0,200,83,0.2),rgba(0,230,118,0.05))", border:"1px solid rgba(0,200,83,0.3)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:36 },
        doneTitle: { fontSize:26, fontWeight:800, color:"#fff", marginBottom:6 },
        doneSub:   { fontSize:14, color:"#6b7280" },
        doneStats: { display:"flex", justifyContent:"space-around", marginTop:16, paddingTop:16, borderTop:"1px solid rgba(255,255,255,0.06)" },
        statItem:  { textAlign:"center" },
        statIcon:  { fontSize:20, marginBottom:4 },
        statLabel: { fontSize:12, fontWeight:700, color:"#9ca3af" },
        statVal:   { fontSize:11, color:"#6b7280" },
        secBtn:    { width:"100%", padding:14, marginTop:8, background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:14, color:"#9ca3af", fontSize:14, cursor:"pointer", fontWeight:600 },
        footer:    { textAlign:"center", fontSize:11, color:"#374151", padding:"12px 16px 24px", borderTop:"1px solid rgba(255,255,255,0.04)" },
        btnGreen:  { background:"linear-gradient(135deg,#00c853,#00e676)", boxShadow:"0 6px 24px rgba(0,200,83,0.35)" },
      };

      return (
        <div style={S.root}>
          {/* HEADER */}
          <header style={S.header}>
            <div style={S.logo}>
              <div style={S.logoIcon}>▶</div>
              <div>
                <div style={S.logoTitle}>DoblaYT</div>
                <div style={S.logoSub}>Traductor de video al español</div>
              </div>
            </div>
            <div style={S.badge}>BETA</div>
          </header>

          <main style={S.main}>

            {/* ── IDLE ── */}
            {phase === "idle" && (
              <div className="fade-in">
                <div style={S.heroText}>
                  Pegá el link de YouTube<br/>
                  <span style={S.accent}>y lo doblamos al español</span>
                </div>

                <div style={S.card}>
                  <div style={S.label}>🔗 Enlace de YouTube</div>
                  <div style={S.inputRow}>
                    <input
                      style={S.input}
                      placeholder="https://youtube.com/watch?v=..."
                      value={url}
                      onChange={e => { setUrl(e.target.value); setError(""); }}
                      onKeyDown={e => e.key === "Enter" && handleTranslate()}
                    />
                    {url && <button style={S.clearBtn} onClick={() => setUrl("")}>✕</button>}
                  </div>
                  {error && <div style={S.errBox}>{error}</div>}
                  <button
                    className="btn-main"
                    style={{ ...S.btn, ...(isValid(url) ? {} : S.btnDis) }}
                    onClick={handleTranslate}
                  >
                    🎬 Traducir Video
                  </button>
                </div>

                <div style={S.pills}>
                  {["✅ 100% Gratis","🎙️ Whisper AI","🔊 Voz natural","⚡ Sin registro"].map(p =>
                    <div key={p} style={S.pill}>{p}</div>
                  )}
                </div>

                <div style={S.howTitle}>¿Cómo funciona?</div>
                <div style={S.howList}>
                  {[
                    ["1","Pegás el link del video de YouTube"],
                    ["2","La IA extrae y traduce el audio al español"],
                    ["3","Se genera una voz natural sincronizada"],
                    ["4","Descargás el video doblado"],
                  ].map(([n,t]) => (
                    <div key={n} style={S.howItem}>
                      <div style={S.howNum}>{n}</div>
                      <div style={S.howText}>{t}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── PROCESSING ── */}
            {phase === "processing" && (
              <div className="fade-in">
                {videoInfo?.thumb && (
                  <div style={S.thumbCard}>
                    <img src={videoInfo.thumb} alt="thumb" style={S.thumb} onError={e => e.target.style.display="none"} />
                    <div style={S.thumbBadge}>🔄 Procesando...</div>
                  </div>
                )}
                <div style={S.card}>
                  <div style={S.procTitle}>Doblando tu video</div>
                  <div style={S.procSub}>No cierres esta pantalla</div>

                  {STEPS.map((st, i) => {
                    const isDone = i < currentStep;
                    const isActive = i === currentStep;
                    return (
                      <div key={i} style={S.stepRow}>
                        <div style={{ ...S.stepIcon, ...(isDone ? S.stepIconD : {}), ...(isActive ? S.stepIconA : {}) }}>
                          {isDone ? "✓" : st.icon}
                        </div>
                        <div style={{ flex:1 }}>
                          <div style={{ ...S.stepLabel, ...(isDone ? S.stepLabelD : {}), ...(isActive ? S.stepLabelA : {}) }}>
                            {st.label}
                          </div>
                          {isActive && <div style={S.stepDesc}>{st.desc}</div>}
                          {isActive && (
                            <div style={S.progBar}>
                              <div style={{ ...S.progFill, width:`${stepProg}%` }} />
                            </div>
                          )}
                        </div>
                        {isDone && <span style={{ fontSize:16, paddingTop:8 }}>✅</span>}
                        {isActive && <div className="spinner" style={S.dot} />}
                      </div>
                    );
                  })}

                  <div style={S.overLabel}>
                    Paso {Math.min(currentStep+1, STEPS.length)} de {STEPS.length}
                  </div>
                  <div style={S.overAll}>
                    <div style={{ ...S.overFill, width:`${((currentStep*100+stepProg)/STEPS.length)}%` }} />
                  </div>
                </div>
                <button style={S.cancelBtn} onClick={reset}>Cancelar proceso</button>
              </div>
            )}

            {/* ── DONE ── */}
            {phase === "done" && (
              <div className="fade-in">
                <div style={S.doneHero}>
                  <div className="pop-in" style={S.doneWrap}>🎉</div>
                  <div style={S.doneTitle}>¡Video listo!</div>
                  <div style={S.doneSub}>Tu video fue doblado al español</div>
                </div>

                {videoInfo?.thumb && (
                  <div style={S.thumbCard}>
                    <img src={videoInfo.thumb} alt="thumb" style={S.thumb} onError={e => e.target.style.display="none"} />
                    <div style={{ ...S.thumbBadge, background:"rgba(0,200,100,0.85)" }}>✅ Doblado</div>
                  </div>
                )}

                <div style={S.card}>
                  <a
                    href={downloadUrl}
                    download="video_doblado.mp4"
                    style={{ textDecoration:"none" }}
                  >
                    <button className="btn-main" style={{ ...S.btn, ...S.btnGreen }}>
                      ⬇️ Descargar Video Doblado
                    </button>
                  </a>
                  <div style={S.doneStats}>
                    {[["🎙️","Transcrito","Whisper AI"],["🌐","Traducido","al español"],["🔊","Voz","Natural TTS"]].map(([ic,t,v]) => (
                      <div key={t} style={S.statItem}>
                        <div style={S.statIcon}>{ic}</div>
                        <div style={S.statLabel}>{t}</div>
                        <div style={S.statVal}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <button style={S.secBtn} onClick={reset}>← Traducir otro video</button>
              </div>
            )}

          </main>

          <footer style={S.footer}>
            Powered por Whisper · edge-tts · FFmpeg · yt-dlp
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
