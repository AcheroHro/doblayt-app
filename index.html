<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DoblaYT</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    body {
      background:#0b0f1a;
      color:white;
      font-family:sans-serif;
      max-width:400px;
      margin:auto;
      padding:20px;
    }

    input, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    input { background:#1a2233; color:white; }

    button {
      background:#ff3b3b;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#111827;
      padding:15px;
      border-radius:12px;
      margin-top:15px;
    }

    .error { color:#ff6b6b; margin-top:10px; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

const API_URL = "https://achero-doblayt-backend.hf.space";

const INVIDIOUS = [
  "https://yewtu.be",
  "https://inv.nadeko.net",
  "https://invidious.slipfox.xyz"
];

// 🔹 ID del video
function getId(url) {
  try {
    if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
    if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
  } catch {}
  return null;
}

// 🔥 CAPTIONS ROBUSTO
async function getCaptions(videoId) {

  let lastError = null;

  for (const base of INVIDIOUS) {
    try {
      console.log("Probando:", base);

      const res = await fetch(`${base}/api/v1/videos/${videoId}`);
      if (!res.ok) throw new Error("video fail");

      const data = await res.json();

      if (!data.captions || data.captions.length === 0) {
        throw new Error("sin subtítulos");
      }

      const track =
        data.captions.find(t => t.language_code === "en") ||
        data.captions.find(t => t.language_code?.includes("en")) ||
        data.captions[0];

      if (!track?.url) throw new Error("sin url captions");

      const xmlRes = await fetch(base + track.url);
      if (!xmlRes.ok) throw new Error("xml fail");

      const xml = await xmlRes.text();

      if (!xml || xml.length < 50) {
        throw new Error("xml vacío");
      }

      console.log("✅ OK:", base);
      return xml;

    } catch (e) {
      console.log("❌ Falló:", base, e.message);
      lastError = e;
    }
  }

  throw lastError || new Error("Error general");
}

// 🔹 parse XML
function parseXML(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  return Array.from(doc.getElementsByTagName("text"))
    .map(n => n.textContent)
    .join(" ");
}

function App() {

  const [url, setUrl] = useState("");
  const [resultado, setResultado] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const traducir = async () => {

    const id = getId(url);

    if (!id) {
      setError("Link inválido");
      return;
    }

    setError("");
    setResultado("");
    setLoading(true);

    try {

      // 1️⃣ captions
      const xml = await getCaptions(id);
      const texto = parseXML(xml);

      if (!texto || texto.length < 20) {
        throw new Error("no texto");
      }

      // 2️⃣ backend
      const res = await fetch(API_URL + "/traducir", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ texto })
      });

      if (!res.ok) throw new Error("backend fail");

      const data = await res.json();

      setResultado(data.traducido || "Sin resultado");

    } catch (e) {

      if (e.message.includes("subtítulos")) {
        setError("Este video no tiene subtítulos");
      } else {
        setError("Error obteniendo subtítulos (Invidious inestable)");
      }

    }

    setLoading(false);
  };

  return (
    <div>

      <h2>🎬 DoblaYT</h2>

      <input
        placeholder="Pegá link de YouTube"
        value={url}
        onChange={e => setUrl(e.target.value)}
      />

      <button onClick={traducir}>
        {loading ? "Procesando..." : "Traducir"}
      </button>

      {error && <div className="error">{error}</div>}

      {resultado && (
        <div className="card">
          <div style={{ maxHeight:200, overflow:"auto", lineHeight:1.5 }}>
            {resultado}
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
