<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DoblaYT</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    body {
      background:#0b0f1a;
      color:white;
      font-family:sans-serif;
      padding:20px;
      max-width:400px;
      margin:auto;
    }

    input, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    input {
      background:#1a2233;
      color:white;
    }

    button {
      background:#ff3b3b;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#111827;
      padding:15px;
      border-radius:12px;
      margin-top:15px;
    }

    .error {
      color:#ff6b6b;
      margin-top:10px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

const API_URL = "https://achero-doblayt-backend.hf.space";

const INVIDIOUS = [
  "https://yewtu.be",
  "https://inv.nadeko.net",
  "https://invidious.slipfox.xyz"
];

// 🔹 Extraer ID
function getId(url) {
  try {
    if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
    if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
  } catch {}
  return null;
}

// 🔹 Obtener captions BIEN
async function getCaptions(videoId) {
  for (const base of INVIDIOUS) {
    try {
      const res = await fetch(`${base}/api/v1/videos/${videoId}`);
      if (!res.ok) continue;

      const data = await res.json();
      const tracks = data.captions;

      if (!tracks || tracks.length === 0) continue;

      const track =
        tracks.find(t => t.language_code === "en") ||
        tracks.find(t => t.language_code?.includes("en")) ||
        tracks[0];

      if (!track?.url) continue;

      const xmlRes = await fetch(base + track.url);
      if (!xmlRes.ok) continue;

      const xml = await xmlRes.text();
      if (!xml || xml.length < 50) continue;

      return xml;

    } catch {}
  }

  throw new Error("No hay subtítulos disponibles");
}

// 🔹 Parsear XML
function parseXML(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  return Array.from(doc.getElementsByTagName("text"))
    .map(n => n.textContent)
    .join(" ");
}

function App() {

  const [url, setUrl] = useState("");
  const [resultado, setResultado] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handle = async () => {

    const id = getId(url);

    if (!id) {
      setError("Link inválido");
      return;
    }

    setError("");
    setResultado("");
    setLoading(true);

    try {
      // 1️⃣ captions
      const xml = await getCaptions(id);
      const texto = parseXML(xml);

      // 2️⃣ traducir
      const res = await fetch(API_URL + "/traducir", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ texto })
      });

      const data = await res.json();

      setResultado(data.traducido || "Sin resultado");

    } catch (e) {
      setError("No se pudieron obtener subtítulos");
    }

    setLoading(false);
  };

  return (
    <div>

      <h2>🎬 DoblaYT</h2>

      <input
        placeholder="Pegá link de YouTube"
        value={url}
        onChange={e=>setUrl(e.target.value)}
      />

      <button onClick={handle}>
        {loading ? "Procesando..." : "Traducir"}
      </button>

      {error && <div className="error">{error}</div>}

      {resultado && (
        <div className="card">
          <div style={{maxHeight:200, overflow:"auto"}}>
            {resultado}
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
