<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoblaYT – Traductor</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0f17;
      font-family: Arial;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      background: #1a1f2b;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #ff3c3c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #141924;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .error {
      color: #ff6b6b;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      margin-top: 20px;
    }

    .result {
      max-height: 250px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.5;
      color: #c9d1e0;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const API_URL = "https://achero-doblayt-backend.hf.space";

const INVIDIOUS = [
  "https://yewtu.be",
  "https://inv.nadeko.net",
  "https://invidious.slipfox.xyz",
];

// ───── helpers ─────

function getVideoId(url) {
  try {
    if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
    if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
    return null;
  } catch {
    return null;
  }
}

async function fetchCaptions(videoId) {
  for (const base of INVIDIOUS) {
    try {
      const res = await fetch(`${base}/api/v1/captions/${videoId}?lang=en`);
      if (!res.ok) continue;

      const xml = await res.text();
      if (xml.length > 50) return xml;
    } catch {}
  }
  throw new Error("No se pudieron obtener subtítulos");
}

function parseXML(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  return Array.from(doc.getElementsByTagName("text"))
    .map(n => n.textContent)
    .join(" ");
}

// ───── APP ─────

function App() {
  const [url, setUrl] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");
  const [result, setResult] = React.useState("");

  const handle = async () => {
    const id = getVideoId(url);

    if (!id) {
      setError("Link inválido");
      return;
    }

    setError("");
    setResult("");
    setLoading(true);

    try {
      // 1. captions
      const xml = await fetchCaptions(id);
      const texto = parseXML(xml);

      if (!texto || texto.length < 20) {
        throw new Error("El video no tiene subtítulos");
      }

      // 2. backend
      const res = await fetch(`${API_URL}/traducir`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ texto })
      });

      if (!res.ok) throw new Error("Error del backend");

      const data = await res.json();

      setResult(data.traducido || "Sin resultado");

    } catch (e) {
      setError(e.message);
    }

    setLoading(false);
  };

  return (
    <div className="container">

      <h2>🎬 DoblaYT</h2>

      <input
        placeholder="Pegá link de YouTube"
        value={url}
        onChange={e => setUrl(e.target.value)}
      />

      {error && <div className="error">{error}</div>}

      <button onClick={handle}>
        Traducir
      </button>

      {loading && (
        <div className="loading">Procesando...</div>
      )}

      {result && (
        <div className="card">
          <div className="result">{result}</div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
